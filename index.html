<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhanced Daily Habit Tracker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#1e1e2f,#2b124c);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:600px;
    background:#2c2c54;
    padding:25px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.4);
}

h1{
    text-align:center;
    color:#c77dff;
    margin-bottom:10px;
}

#date{
    text-align:center;
    color:#ddd;
    margin-bottom:10px;
}

.quote{
    text-align:center;
    font-style:italic;
    color:#e0aaff;
    margin-bottom:20px;
}

.habit{
    display:flex;
    align-items:center;
    margin:12px 0;
    padding:10px;
    background:#40407a;
    border-radius:10px;
}

.habit input[type="checkbox"]{
    margin-right:10px;
    transform:scale(1.3);
}

.progress-container{
    width:100%;
    background:#555;
    border-radius:30px;
    overflow:hidden;
    margin-top:20px;
}

.progress-bar{
    height:30px;
    width:0%;
    background:linear-gradient(to right,#7b2cbf,#c77dff);
    text-align:center;
    line-height:30px;
    transition:width .8s ease;
}

.add-section{
    display:flex;
    margin-top:20px;
    gap:10px;
}

.add-section input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
}

.add-section button{
    background:#9d4edd;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

.add-section button:hover{
    background:#c77dff;
}

.message{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
    color:#80ffdb;
    font-size:20px;
}

.celebrate{
    animation:bounce .8s infinite alternate;
}

@keyframes bounce{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-5px);
    }
}
</style>
</head>
<body>

<div class="container">

<h1>✨ Daily Habit Tracker</h1>

<div id="date"></div>

<div class="quote" id="quote"></div>

<div id="habitList"></div>

<div class="progress-container">
<div class="progress-bar" id="progressBar">0%</div>
</div>

<div class="message" id="message"></div>

<div class="add-section">
<input type="text" id="newHabit" placeholder="Enter a new habit">
<button onclick="addHabit()">Add Habit</button>
</div>

</div>

<script>

const quotes = [
"Small progress is still progress.",
"Success comes from consistency.",
"Every day is a fresh start.",
"Discipline creates freedom.",
"You are capable of amazing things.",
"Keep going. Your future self will thank you.",
"One habit at a time changes everything."
];

const today = new Date();

document.getElementById("date").innerHTML =
today.toDateString();

document.getElementById("quote").innerHTML =
quotes[today.getDate() % quotes.length];

const defaultHabits = [
"Drink Water",
"Exercise",
"Read",
"Meditate",
"Sleep 8 Hours"
];

const currentDate = today.toDateString();

if(localStorage.getItem("savedDate") !== currentDate){
    localStorage.clear();
    localStorage.setItem("savedDate",currentDate);
}

let habits =
JSON.parse(localStorage.getItem("habits")) ||
defaultHabits;

function renderHabits(){

const habitList =
document.getElementById("habitList");

habitList.innerHTML = "";

habits.forEach((habit,index)=>{

const checked =
localStorage.getItem("habit"+index)==="true";

habitList.innerHTML += `
<div class="habit">
<input type="checkbox"
${checked ? "checked" : ""}
onchange="saveHabit(${index},this.checked)">
${habit}
</div>
`;
});

updateProgress();
}

function saveHabit(index,status){
localStorage.setItem(
"habit"+index,
status
);

updateProgress();
}

function updateProgress(){

let completed = 0;

habits.forEach((habit,index)=>{
if(localStorage.getItem("habit"+index)==="true"){
completed++;
}
});

let percent =
Math.round(
(completed/habits.length)*100
);

const bar =
document.getElementById("progressBar");

bar.style.width = percent + "%";
bar.innerHTML = percent + "%";

const msg =
document.getElementById("message");

if(percent === 100){

msg.innerHTML =
"🎉 Congratulations! You completed every habit today!";

msg.classList.add("celebrate");

}else{

msg.innerHTML = "";
msg.classList.remove("celebrate");

}
}

function addHabit(){

const input =
document.getElementById("newHabit");

const habit =
input.value.trim();

if(habit==="") return;

habits.push(habit);

localStorage.setItem(
"habits",
JSON.stringify(habits)
);

input.value="";

renderHabits();
}

renderHabits();

</script>

</body>
</html>
